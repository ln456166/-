<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芒果TV视频播放器</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            width: 90%;
            max-width: 1200px;
        }
        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #2a2a2a;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        input[type="text"]:focus {
            border-color: #ff6b00;
        }
        button {
            padding: 12px 24px;
            background: #ff6b00;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #ff8533;
        }
        #video {
            width: 100%;
            border-radius: 8px;
            background: #000;
            aspect-ratio: 16/9;
        }
        .status {
            color: #999;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
        }
        .error { color: #ff4444; }
        .success { color: #44ff44; }
    </style>
</head>
<body>
    <div class="container">
        <h1>芒果TV视频播放器</h1>
        <div class="input-group">
            <input type="text" id="urlInput" placeholder="请输入芒果TV视频链接，例如：https://www.mgtv.com/b/783747/24451558.html">
            <button onclick="playVideo()">播放</button>
        </div>
        <video id="video" controls autoplay></video>
        <div class="status" id="status">请输入视频链接开始播放</div>
    </div>

    <script>
        const video = document.getElementById('video');
        const statusEl = document.getElementById('status');
        let hls = null;

        function getQueryParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }

        function playVideo() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                setStatus('请输入视频链接', 'error');
                return;
            }

            setStatus('正在解析视频地址...', '');
            const apiUrl = `mg.php?url=${encodeURIComponent(url)}&format=m3u8`;
            loadVideo(apiUrl);
        }

        function loadVideo(src) {
            if (hls) {
                hls.destroy();
                hls = null;
            }

            if (Hls.isSupported()) {
                hls = new Hls({
                    maxBufferLength: 30,
                    maxMaxBufferLength: 60
                });

                hls.loadSource(src);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    setStatus('视频加载成功，正在播放...', 'success');
                    video.play().catch(e => {
                        setStatus('视频已就绪，请点击播放', 'success');
                    });
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        switch(data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                setStatus('网络错误：' + data.details, 'error');
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                setStatus('媒体错误：' + data.details, 'error');
                                hls.recoverMediaError();
                                break;
                            default:
                                setStatus('播放错误：' + data.details, 'error');
                                hls.destroy();
                                break;
                        }
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = src;
                video.addEventListener('loadedmetadata', function() {
                    setStatus('视频加载成功，正在播放...', 'success');
                    video.play().catch(e => {
                        setStatus('视频已就绪，请点击播放', 'success');
                    });
                });
                video.addEventListener('error', function() {
                    setStatus('视频加载失败', 'error');
                });
            } else {
                setStatus('您的浏览器不支持HLS播放', 'error');
            }
        }

        function setStatus(msg, type) {
            statusEl.textContent = msg;
            statusEl.className = 'status ' + type;
        }

        const urlParam = getQueryParam('url');
        if (urlParam) {
            document.getElementById('urlInput').value = urlParam;
            playVideo();
        }
    </script>
</body>
</html>
