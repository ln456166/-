<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放地址替换系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .platforms {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 25px;
        }
        .platform-tag {
            padding: 5px 12px;
            background: #f0f4ff;
            color: #667eea;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #666;
            font-weight: 500;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="text"],
        input[type="number"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .result.error {
            background: #fff5f5;
            border-left: 4px solid #f56565;
        }
        .result.success {
            background: #f0fff4;
            border-left: 4px solid #48bb78;
        }
        .result-title {
            font-weight: 600;
            margin-bottom: 12px;
            color: #333;
        }
        .result-item {
            margin-bottom: 10px;
            font-size: 14px;
            color: #555;
        }
        .result-item strong {
            color: #333;
        }
        .result-url {
            word-break: break-all;
            padding: 10px;
            background: white;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            margin-top: 8px;
            border: 1px solid #e0e0e0;
        }
        .copy-btn {
            display: inline-block;
            padding: 6px 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
        }
        .copy-btn:hover {
            background: #5a67d8;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }
        .spinner {
            display: inline-block;
            width: 30px;
            height: 30px;
            border: 3px solid #e0e0e0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .example {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }
        .options {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .options label {
            margin: 0;
            cursor: pointer;
            font-size: 14px;
        }
        .options input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
        .parse-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
            margin-left: 8px;
        }
        .parse-badge.success {
            background: #c6f6d5;
            color: #22543d;
        }
        .parse-badge.fail {
            background: #fed7d7;
            color: #742a2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>视频播放地址替换系统</h1>
        <p class="subtitle">支持多平台视频播放地址一键替换</p>
        <div class="platforms">
            <span class="platform-tag">腾讯视频</span>
            <span class="platform-tag">优酷</span>
            <span class="platform-tag">爱奇艺</span>
            <span class="platform-tag">哔哩哔哩</span>
            <span class="platform-tag">芒果TV</span>
            <span class="platform-tag">搜狐视频</span>
            <span class="platform-tag">PPTV</span>
            <span class="platform-tag">乐视视频</span>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-tab="url">URL替换</div>
            <div class="tab" data-tab="name">名称搜索</div>
        </div>

        <div class="tab-content active" id="tab-url">
            <div class="form-group">
                <label for="urlInput">视频播放地址</label>
                <input type="text" id="urlInput" placeholder="请输入腾讯/优酷/爱奇艺/B站/芒果TV等播放地址">
                <div class="example">支持：腾讯视频、优酷、爱奇艺、哔哩哔哩、芒果TV等</div>
            </div>
            <div class="options">
                <input type="checkbox" id="parseUrl" checked>
                <label for="parseUrl">启用API解析（解析成功返回解析后地址，失败返回原地址）</label>
            </div>
            <button class="btn" onclick="replaceByUrl()">立即替换</button>
        </div>

        <div class="tab-content" id="tab-name">
            <div class="form-group">
                <label for="nameInput">视频名称</label>
                <input type="text" id="nameInput" placeholder="请输入视频名称，如：斗罗大陆">
            </div>
            <div class="form-group">
                <label for="episodeInput">集数</label>
                <input type="number" id="episodeInput" value="1" min="1" placeholder="请输入集数">
            </div>
            <div class="options">
                <input type="checkbox" id="parseName" checked>
                <label for="parseName">启用API解析（解析成功返回解析后地址，失败返回原地址）</label>
            </div>
            <button class="btn" onclick="replaceByName()">立即替换</button>
        </div>

        <div class="result" id="result">
            <div class="result-title" id="resultTitle">替换结果</div>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', function() {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                document.getElementById('tab-' + this.dataset.tab).classList.add('active');
            });
        });

        function showLoading() {
            const result = document.getElementById('result');
            result.className = 'result show';
            document.getElementById('resultTitle').textContent = '处理中...';
            document.getElementById('resultContent').innerHTML = '<div class="loading"><span class="spinner"></span>正在获取资源...</div>';
        }

        function showResult(data) {
            const result = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');

            if (data.code === 0) {
                result.className = 'result show success';
                resultTitle.textContent = '✓ 替换成功';

                let parseBadge = '';
                let resourceUrlHtml = '';

                if (typeof data.data.parse_success !== 'undefined') {
                    if (data.data.parse_success) {
                        parseBadge = '<span class="parse-badge success">解析成功</span>';
                    } else {
                        parseBadge = '<span class="parse-badge fail">解析失败</span>';
                    }
                    resourceUrlHtml = `
                        <div class="result-item">
                            <strong>资源站原地址：</strong>
                            <div class="result-url" style="font-size: 12px; opacity: 0.7;">${data.data.resource_url}</div>
                        </div>
                    `;
                    if (data.data.parse_msg) {
                        resourceUrlHtml += `<div class="result-item" style="font-size: 12px; color: #888;">解析说明：${data.data.parse_msg}</div>`;
                    }
                }

                resultContent.innerHTML = `
                    <div class="result-item">
                        <strong>视频名称：</strong>${data.data.video_name}
                        ${parseBadge}
                    </div>
                    ${data.data.video_sub ? `<div class="result-item"><strong>别名：</strong>${data.data.video_sub}</div>` : ''}
                    ${data.data.platform ? `<div class="result-item"><strong>来源平台：</strong>${data.data.platform}</div>` : ''}
                    <div class="result-item">
                        <strong>集数：</strong>第 ${data.data.episode} 集 (${data.data.episode_name})
                    </div>
                    <div class="result-item">
                        <strong>播放地址：</strong>
                        <div class="result-url">${data.data.play_url}</div>
                        <button class="copy-btn" onclick="copyUrl('${data.data.play_url}')">复制链接</button>
                        <button class="copy-btn" onclick="openUrl('${data.data.play_url}')" style="background:#48bb78;">打开播放</button>
                    </div>
                    ${resourceUrlHtml}
                `;
            } else {
                result.className = 'result show error';
                resultTitle.textContent = '✗ 替换失败';
                resultContent.innerHTML = `<div class="result-item">${data.msg}</div>`;
            }
        }

        function replaceByUrl() {
            const url = document.getElementById('urlInput').value.trim();
            const parse = document.getElementById('parseUrl').checked ? 1 : 0;
            if (!url) {
                alert('请输入视频播放地址');
                return;
            }
            showLoading();
            fetch('replace.php?url=' + encodeURIComponent(url) + '&parse=' + parse)
                .then(res => res.json())
                .then(data => showResult(data))
                .catch(err => {
                    showResult({ code: 1, msg: '请求失败：' + err.message });
                });
        }

        function replaceByName() {
            const name = document.getElementById('nameInput').value.trim();
            const episode = document.getElementById('episodeInput').value;
            const parse = document.getElementById('parseName').checked ? 1 : 0;
            if (!name) {
                alert('请输入视频名称');
                return;
            }
            showLoading();
            fetch('replace.php?name=' + encodeURIComponent(name) + '&episode=' + episode + '&parse=' + parse)
                .then(res => res.json())
                .then(data => showResult(data))
                .catch(err => {
                    showResult({ code: 1, msg: '请求失败：' + err.message });
                });
        }

        function copyUrl(url) {
            navigator.clipboard.writeText(url).then(() => {
                alert('链接已复制到剪贴板');
            }).catch(() => {
                const textarea = document.createElement('textarea');
                textarea.value = url;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('链接已复制到剪贴板');
            });
        }

        function openUrl(url) {
            window.open(url, '_blank');
        }

        document.getElementById('urlInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') replaceByUrl();
        });
        document.getElementById('nameInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') replaceByName();
        });
        document.getElementById('episodeInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') replaceByName();
        });
    </script>
</body>
</html>
